name: Download MOLIT realdata auto rerun

on:
  workflow_dispatch:
  schedule:
    # 06:30 KST every day
    - cron: "30 21 * * *"

permissions:
  contents: read
  actions: read

env:
  GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
  GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
  GDRIVE_BASE_PATH: ${{ secrets.GDRIVE_BASE_PATH }}

  OUT_DIR: output
  DEBUG_DIR: debug

  # The job-level preflight already checked this runner.
  RUN_ACCESS_TEST: "0"
  MOLIT_ACCESS_TEST_ONLY: "0"
  BROWSER_PREFLIGHT: "1"
  STRICT_PREFLIGHT: "1"

  HEADLESS: "1"
  DOWNLOAD_TIMEOUT: "60"
  CLICK_RETRY_MAX: "15"
  CLICK_RETRY_WAIT: "1"
  NAV_RETRY_MAX: "10"
  PAGELOAD_TIMEOUT: "120"
  NAV_BACKOFF_BASE: "8"
  MONTH_SLEEP: "2"
  CATEGORY_SLEEP: "5"
  JITTER_SLEEP: "1.5"
  CURRENT_MONTH_DELAY_DAYS: "0"
  CURRENT_MONTH_CLICK_RETRY_MAX: "3"
  ALLOW_EMPTY_CURRENT_MONTH: "1"

jobs:
  attempt1:
    name: Attempt 1
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 180
    outputs:
      success: ${{ steps.mark_success.outputs.success }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Preflight MOLIT access
        id: preflight
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          import socket, ssl, sys, time, urllib.request
          host = "rt.molit.go.kr"
          url = "https://rt.molit.go.kr/pt/xls/xls.do?mobileAt="
          timeout = 20
          print("=== MOLIT QUICK PREFLIGHT START ===", flush=True)
          try:
              with urllib.request.urlopen("https://api.ipify.org", timeout=10) as resp:
                  print("public_ip :", resp.read().decode().strip(), flush=True)
          except Exception as e:
              print("public_ip : unknown", type(e).__name__, e, flush=True)
          try:
              ips = sorted({info[4][0] for info in socket.getaddrinfo(host, 443, proto=socket.IPPROTO_TCP)})
              print("DNS OK    :", ", ".join(ips), flush=True)
              started = time.time()
              with socket.create_connection((host, 443), timeout=timeout):
                  print(f"TCP OK    : {time.time() - started:.3f}s", flush=True)
              ctx = ssl.create_default_context()
              started = time.time()
              with socket.create_connection((host, 443), timeout=timeout) as raw:
                  with ctx.wrap_socket(raw, server_hostname=host):
                      print(f"TLS OK    : {time.time() - started:.3f}s", flush=True)
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0", "Accept-Language": "ko-KR,ko;q=0.9"})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  raw = resp.read(1024)
                  print(f"HTTP OK   : status={resp.status}, bytes={len(raw)}", flush=True)
              print("RESULT    : OK", flush=True)
          except Exception as e:
              print(f"RESULT    : FAIL ({type(e).__name__}: {e})", flush=True)
              sys.exit(1)
          PY
      - name: Run downloader
        id: downloader
        if: steps.preflight.outcome == 'success'
        shell: bash
        run: python download_realdata.py
      - name: Mark success
        if: steps.downloader.outcome == 'success'
        id: mark_success
        shell: bash
        run: echo "success=1" >> "$GITHUB_OUTPUT"
      - name: Upload debug and output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molit-realdata-attempt1-${{ github.run_id }}
          path: |
            debug/**
            output/**
          if-no-files-found: warn

