name: RT MOLIT pipeline (03:00 KST)

on:
  schedule:
    # GitHub Actions는 UTC 기준. 03:00 KST = 18:00 UTC (전날)
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg curl unzip
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Show runtime info
        run: |
          python --version
          google-chrome --version
          pwd
          ls -la

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas>=2.2,<3" \
            "numpy>=1.23,<3" \
            "openpyxl>=3.1,<4" \
            "selenium>=4.15,<5" \
            "webdriver-manager>=4,<5" \
            "google-api-python-client>=2,<3" \
            "google-auth>=2,<3"

      - name: Run script
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_BASE_PATH: ${{ vars.GDRIVE_BASE_PATH }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          OUT_DIR: output
          DOWNLOAD_TIMEOUT: "60"
          CLICK_RETRY_MAX: "20"
          CLICK_RETRY_WAIT: "1.5"
          NAV_RETRY_MAX: "6"
          PAGELOAD_TIMEOUT: "20"
          CI: "1"
          CHROME_BIN: "/usr/bin/google-chrome"
        run: |
          python -u download_realdata.py
