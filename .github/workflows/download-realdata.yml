name: Download MOLIT realdata

on:
  workflow_dispatch:
  schedule:
    # 06:30 KST every day
    - cron: "30 21 * * *"

permissions:
  contents: read
  actions: read

jobs:
  download:
    name: Download realdata on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_BASE_PATH: ${{ secrets.GDRIVE_BASE_PATH }}

      OUT_DIR: output
      DEBUG_DIR: debug

      RUN_ACCESS_TEST: "1"
      MOLIT_ACCESS_TEST_ONLY: "0"
      BROWSER_PREFLIGHT: "1"
      STRICT_PREFLIGHT: "1"
      ACCESS_FAIL_ACTION: "fail"
      ACCESS_TEST_RETRY: "5"
      ACCESS_TEST_TIMEOUT: "60"
      ACCESS_SOCKET_RETRY_BASE: "10"

      HEADLESS: "1"
      DOWNLOAD_TIMEOUT: "60"
      CLICK_RETRY_MAX: "15"
      CLICK_RETRY_WAIT: "1"
      NAV_RETRY_MAX: "10"
      PAGELOAD_TIMEOUT: "120"
      NAV_BACKOFF_BASE: "8"
      MONTH_SLEEP: "2"
      CATEGORY_SLEEP: "5"
      JITTER_SLEEP: "1.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Chrome
        shell: bash
        run: |
          which google-chrome || true
          google-chrome --version || true

      - name: Run downloader
        shell: bash
        run: |
          python download_realdata.py

      - name: Upload debug and output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molit-realdata-${{ github.run_id }}
          path: |
            debug/**
            output/**
          if-no-files-found: warn
