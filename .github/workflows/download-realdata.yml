name: Download MOLIT realdata Ubuntu pool

on:
  workflow_dispatch:
  schedule:
    # 06:30 KST every day
    - cron: "30 21 * * *"

permissions:
  contents: read
  actions: read

jobs:
  download:
    name: Ubuntu attempt ${{ matrix.slot }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        slot: [1, 2, 3, 4, 5, 6]

    env:
      # Google Drive upload
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_BASE_PATH: ${{ secrets.GDRIVE_BASE_PATH }}

      # Output/debug folders
      OUT_DIR: output
      DEBUG_DIR: debug

      # Browser/download stability
      HEADLESS: "1"
      DOWNLOAD_TIMEOUT: "60"
      CLICK_RETRY_MAX: "15"
      CLICK_RETRY_WAIT: "1"
      NAV_RETRY_MAX: "10"
      PAGELOAD_TIMEOUT: "120"
      NAV_BACKOFF_BASE: "8"
      MONTH_SLEEP: "2"
      CATEGORY_SLEEP: "5"
      JITTER_SLEEP: "1.5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight MOLIT access
        id: preflight
        shell: bash
        run: |
          python - <<'PY'
          import os
          import socket
          import ssl
          import sys
          import time
          import urllib.request

          host = "rt.molit.go.kr"
          url = "https://rt.molit.go.kr/pt/xls/xls.do?mobileAt="
          timeout = 20
          ok = False

          def log(msg):
              print(msg, flush=True)

          log("=== MOLIT PREFLIGHT START ===")
          log(f"slot          : {os.getenv('MATRIX_SLOT', '')}")
          try:
              with urllib.request.urlopen("https://api.ipify.org", timeout=10) as resp:
                  log(f"public_ip     : {resp.read().decode().strip()}")
          except Exception as e:
              log(f"public_ip     : unknown ({type(e).__name__}: {e})")

          for attempt in range(1, 3):
              log(f"--- preflight attempt {attempt}/2 ---")
              try:
                  ips = sorted({info[4][0] for info in socket.getaddrinfo(host, 443, proto=socket.IPPROTO_TCP)})
                  log(f"DNS OK        : {', '.join(ips)}")

                  started = time.time()
                  with socket.create_connection((host, 443), timeout=timeout):
                      log(f"TCP OK        : {time.time() - started:.3f}s")

                  context = ssl.create_default_context()
                  started = time.time()
                  with socket.create_connection((host, 443), timeout=timeout) as raw_sock:
                      with context.wrap_socket(raw_sock, server_hostname=host):
                          log(f"TLS OK        : {time.time() - started:.3f}s")

                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": (
                              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                              "AppleWebKit/537.36 (KHTML, like Gecko) "
                              "Chrome/149.0.0.0 Safari/537.36"
                          ),
                          "Accept-Language": "ko-KR,ko;q=0.9,en-US;q=0.7,en;q=0.6",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      raw = resp.read(1024)
                      log(f"HTTP OK       : status={resp.status}, bytes={len(raw)}")

                  ok = True
                  break
              except Exception as e:
                  log(f"PREFLIGHT FAIL: {type(e).__name__}: {e}")
                  time.sleep(3)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"MOLIT_PREFLIGHT_OK={'1' if ok else '0'}\n")

          log(f"RESULT         : {'OK' if ok else 'FAIL'}")
          log("=== MOLIT PREFLIGHT END ===")
          sys.exit(0)
          PY
        env:
          MATRIX_SLOT: ${{ matrix.slot }}

      - name: Skip blocked runner
        if: env.MOLIT_PREFLIGHT_OK != '1'
        shell: bash
        run: |
          echo "This Ubuntu runner cannot reach rt.molit.go.kr."
          echo "Skipping this matrix slot without failing the whole workflow."

      - name: Run downloader
        if: env.MOLIT_PREFLIGHT_OK == '1'
        shell: bash
        env:
          # Same runner already passed preflight. Avoid wasting time on another long socket test.
          RUN_ACCESS_TEST: "0"
          MOLIT_ACCESS_TEST_ONLY: "0"
          BROWSER_PREFLIGHT: "1"
          STRICT_PREFLIGHT: "1"
        run: |
          python download_realdata.py

      - name: Upload debug and output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molit-realdata-slot-${{ matrix.slot }}-${{ github.run_id }}
          path: |
            debug/**
            output/**
          if-no-files-found: warn
